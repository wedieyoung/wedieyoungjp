name: Deploy to Lolipop (FTP)

# main ブランチに変更が反映されたら自動デプロイ。
# 手動実行（Actions タブの "Run workflow" ボタン）も可能。
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # アップロード先（公開フォルダ）。Lolipop の構成に合わせて Secret で指定。
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # サイト本体以外（ドキュメント・設定ファイル）はアップロードしない
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/.DS_Store
            README.md
            サイト移行手順.md
